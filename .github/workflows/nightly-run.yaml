name: Nightly Run

on:
  schedule:
    - cron: "0 2 * * *"

  workflow_dispatch:

permissions:
  contents: read
  actions: read
jobs:
  nightly-test:
    uses: ./.github/workflows/test-run.yaml
    with:
      report: junit
    secrets: inherit
    permissions:
      contents: read
      actions: read

  upload-xray:
    needs: nightly-test
    runs-on: ubuntu-latest

    env:
      XRAY_CLIENT_ID: ${{ secrets.XRAY_CLIENT_ID }}
      XRAY_CLIENT_SECRET: ${{ secrets.XRAY_CLIENT_SECRET }}
      XRAY_PROJECT_KEY: QTO

    steps:
      - name: Download JUnit report
        uses: actions/download-artifact@v4
        with:
          name: testorchestra-junit-report
          path: reports

      - name: Upload all JUnit reports to Xray
        run: |
          TOKEN=$(curl -s \
          -H "Content-Type: application/json" \
          -X POST \
          --data "{\"client_id\":\"$XRAY_CLIENT_ID\",\"client_secret\":\"$XRAY_CLIENT_SECRET\"}" \
          https://eu.xray.cloud.getxray.app/api/v2/authenticate | tr -d '"')

          if [ -z "$TOKEN" ]; then
            echo "Xray auth failed"
            exit 1
          fi

          DATE=$(date +%F)
          cat > test-execution.json <<EOF
          {
          "fields": {
            "project": {
              "key": "${XRAY_PROJECT_KEY}"
            },
            "summary": "Nightly Test #${GITHUB_RUN_NUMBER} - ${DATE}",
            "description": "Automatically created by TestOrchestra Nightly Run",
            "issuetype": {
              "name": "Test Execution"
            },
            "assignee": {
              "accountId": "712020:57db405f-4d18-4b41-bbe5-cd33570450c8"
            },
            "labels": [
              "nightly",
              "testorchestra",
              "xray-json"
            ]
            }
          } 
          EOF

          echo "Found Xray JSON reports:"
          find reports -name "xray-report.json" -type f

          for file in $(find reports -name "xray-report.json" -type f); do
            echo "Uploading $file"

            HTTP_STATUS=$(curl -s \
              -o xray-response.json \
              -w "%{http_code}" \
              -H "Authorization: Bearer $TOKEN" \
              -F "results=@${file};type=application/json" \
              -F "info=@test-execution.json;type=application/json" \
              https://eu.xray.cloud.getxray.app/api/v2/import/execution/multipart)

            echo "HTTP Status: $HTTP_STATUS"
            cat xray-response.json

            if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
              echo "Upload failed"
              exit 1
            fi
          done