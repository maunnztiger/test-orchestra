name: Nightly Run

on:
  schedule:
    - cron: "0 2 * * *"

  workflow_dispatch:

permissions:
  contents: read
  actions: read
jobs:
  nightly-test:
    uses: ./.github/workflows/test-run.yaml
    with:
      report: junit
    secrets: inherit
    permissions:
      contents: read
      actions: read

  upload-xray:
    needs: nightly-test
    runs-on: ubuntu-latest

    env:
      XRAY_CLIENT_ID: ${{ secrets.XRAY_CLIENT_ID }}
      XRAY_CLIENT_SECRET: ${{ secrets.XRAY_CLIENT_SECRET }}
      XRAY_PROJECT_KEY: QTO

    steps:
      - name: Download JUnit report
        uses: actions/download-artifact@v4
        with:
          name: testorchestra-junit-report
          path: reports

      - name: Upload all JUnit reports to Xray
        run: |
          TOKEN=$(curl -s \
            -H "Content-Type: application/json" \
            -X POST \
            --data "{\"client_id\":\"$XRAY_CLIENT_ID\",\"client_secret\":\"$XRAY_CLIENT_SECRET\"}" \
            https://xray.cloud.getxray.app/api/v2/authenticate | tr -d '"')

          if [ -z "$TOKEN" ]; then
            echo "Xray auth failed: token is empty"
            exit 1
          fi

          echo "Found JUnit reports:"
          find reports -name "*.xml" -type f

          for file in $(find reports -name "*.xml" -type f); do
            echo "Uploading $file to Xray..."

            HTTP_STATUS=$(curl -s \
              -o xray-response.json \
              -w "%{http_code}" \
              -H "Content-Type: text/xml" \
              -H "Authorization: Bearer $TOKEN" \
              --data-binary @"$file" \
              "https://xray.cloud.getxray.app/api/v2/import/execution/junit?projectKey=$XRAY_PROJECT_KEY")

            echo "HTTP status: $HTTP_STATUS"
            echo "Xray response:"
            cat xray-response.json

            if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
              echo "Xray upload failed"
              exit 1
            fi

            echo "Uploaded $file"
          done
