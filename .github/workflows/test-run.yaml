name: test-run

on:
  workflow_call:
    inputs:
      report:
        required: false
        type: string
        default: "junit"

jobs:
  run-tests:
    runs-on: ubuntu-latest

    env:
      APP_URL: ${{ secrets.APP_URL }}
      USER_NAME: ${{ secrets.USER_NAME }}
      USER_PASSWD: ${{ secrets.USER_PASSWD }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Run TestOrchestra
        run: |
          CI=true npm run login -- --report ${{ inputs.report }}

      - name: Upload report JSON
        if: ${{ inputs.report == 'json' }}
        uses: actions/upload-artifact@v4
        with:
          name: testorchestra-json-report
          path: reports/cucumber-report.json

      - name: Upload report JUnit
        if: ${{ inputs.report == 'junit' }}
        uses: actions/upload-artifact@v4
        with:
          name: testorchestra-junit-report
          path: reports/**/*.xml
